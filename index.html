<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <!-- Tailwind CSS for a modern look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-slate-950 text-white p-4 antialiased selection:bg-indigo-500 selection:text-white relative overflow-hidden">

    <!-- Subtle glowing background effect -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(99,102,241,0.08),transparent_50%)] pointer-events-none"></div>

    <div class="z-10 text-center max-w-2xl mx-auto space-y-8">
        <h1 id="title" class="text-4xl md:text-5xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 drop-shadow-sm">
            Time Remaining
        </h1>

        <div id="countdown-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 pt-4">
            <!-- Days Card -->
            <div class="flex flex-col items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md border border-slate-800/80 rounded-2xl shadow-xl">
                <span id="days" class="text-4xl md:text-6xl font-black tabular-nums text-indigo-400">00</span>
                <span class="text-xs md:text-sm font-semibold text-slate-400 mt-2 uppercase tracking-wider">Days</span>
            </div>
            <!-- Hours Card -->
            <div class="flex flex-col items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md border border-slate-800/80 rounded-2xl shadow-xl">
                <span id="hours" class="text-4xl md:text-6xl font-black tabular-nums text-indigo-400">00</span>
                <span class="text-xs md:text-sm font-semibold text-slate-400 mt-2 uppercase tracking-wider">Hours</span>
            </div>
            <!-- Minutes Card -->
            <div class="flex flex-col items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md border border-slate-800/80 rounded-2xl shadow-xl">
                <span id="minutes" class="text-4xl md:text-6xl font-black tabular-nums text-indigo-400">00</span>
                <span class="text-xs md:text-sm font-semibold text-slate-400 mt-2 uppercase tracking-wider">Minutes</span>
            </div>
            <!-- Seconds Card -->
            <div class="flex flex-col items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md border border-slate-800/80 rounded-2xl shadow-xl">
                <span id="seconds" class="text-4xl md:text-6xl font-black tabular-nums text-indigo-400">00</span>
                <span class="text-xs md:text-sm font-semibold text-slate-400 mt-2 uppercase tracking-wider">Seconds</span>
            </div>
        </div>

        <p class="text-sm font-medium text-slate-500 max-w-sm mx-auto border-t border-slate-900 pt-6">
            Target Date: July 16th at 11:00 AM (Egypt Time)
        </p>
    </div>

    <script>
        // Set target date to July 16, 2026, 11:00 AM Egypt Time (+03:00)
        const targetDate = new Date("2026-07-16T11:00:00+03:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference <= 0) {
                clearInterval(timer);
                document.getElementById("title").innerHTML = "Time's Up! 🎉";
                document.getElementById("countdown-container").style.display = "none";
            } else {
                const d = Math.floor(difference / (1000 * 60 * 60 * 24));
                const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = String(d).padStart(2, '0');
                document.getElementById("hours").innerText = String(h).padStart(2, '0');
                document.getElementById("minutes").innerText = String(m).padStart(2, '0');
                document.getElementById("seconds").innerText = String(s).padStart(2, '0');
            }
        }, 1000);
    </script>
</body>
</html>
